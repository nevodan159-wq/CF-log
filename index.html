<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Month 1 — Training Tracker</title>
<style>
  :root {
    --bg: #0f0f0f;
    --bg2: #1a1a1a;
    --bg3: #242424;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f0;
    --text2: #999;
    --text3: #666;
    --accent: #e8ff47;
    --accent-dim: rgba(232,255,71,0.12);
    --strength: #60a5fa;
    --strength-bg: rgba(96,165,250,0.12);
    --zone2: #4ade80;
    --zone2-bg: rgba(74,222,128,0.12);
    --skill: #c084fc;
    --skill-bg: rgba(192,132,252,0.12);
    --wod: #fb923c;
    --wod-bg: rgba(251,146,60,0.12);
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; min-height: 100vh; max-width: 430px; margin: 0 auto; }

  /* Header */
  .app-header { padding: 52px 20px 16px; position: sticky; top: 0; background: var(--bg); z-index: 50; border-bottom: 0.5px solid var(--border); }
  .app-title { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .app-title span { color: var(--accent); }
  .week-tabs { display: flex; gap: 6px; margin-top: 14px; }
  .week-tab { flex: 1; padding: 8px 4px; border-radius: var(--radius-sm); border: 0.5px solid var(--border); background: transparent; color: var(--text2); font-size: 12px; font-weight: 500; cursor: pointer; text-align: center; transition: all 0.15s; }
  .week-tab.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  /* Progress bar */
  .progress-bar { padding: 12px 20px; display: flex; align-items: center; gap: 10px; }
  .prog-label { font-size: 11px; color: var(--text3); white-space: nowrap; }
  .prog-track { flex: 1; height: 3px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
  .prog-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }
  .prog-pct { font-size: 11px; color: var(--text2); min-width: 28px; text-align: right; }

  /* Day list */
  .day-list { padding: 8px 16px 100px; display: flex; flex-direction: column; gap: 8px; }
  .day-card { background: var(--bg2); border-radius: var(--radius); border: 0.5px solid var(--border); overflow: hidden; }
  .day-card.done { border-color: rgba(232,255,71,0.2); }
  .day-header { display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; }
  .day-name { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.6px; width: 28px; flex-shrink: 0; }
  .day-info { flex: 1; min-width: 0; }
  .day-title { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.2; }
  .day-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .day-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .tag { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.4px; }
  .tag-strength { background: var(--strength-bg); color: var(--strength); }
  .tag-zone2 { background: var(--zone2-bg); color: var(--zone2); }
  .tag-skill { background: var(--skill-bg); color: var(--skill); }
  .tag-wod { background: var(--wod-bg); color: var(--wod); }
  .check-circle { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--border2); display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
  .check-circle.checked { background: var(--accent); border-color: var(--accent); }
  .check-circle svg { display: none; }
  .check-circle.checked svg { display: block; }

  /* Expanded session */
  .day-detail { display: none; padding: 0 16px 16px; border-top: 0.5px solid var(--border); }
  .day-detail.open { display: block; }
  .detail-section { margin-top: 14px; }
  .detail-label { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; }
  .detail-body { font-size: 13px; color: var(--text2); line-height: 1.6; }
  .detail-list { list-style: none; }
  .detail-list li { padding: 4px 0; border-bottom: 0.5px solid var(--border); font-size: 13px; color: var(--text2); }
  .detail-list li:last-child { border-bottom: none; }
  .detail-list li::before { content: '·'; color: var(--accent); margin-right: 8px; font-weight: 700; }

  /* Log form */
  .log-section { margin-top: 16px; background: var(--bg3); border-radius: var(--radius-sm); padding: 14px; }
  .log-title { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 12px; }
  .log-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .log-field { flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .log-field label { font-size: 11px; color: var(--text3); }
  .log-field input, .log-field textarea { background: var(--bg2); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); color: var(--text); font-size: 13px; padding: 8px 10px; width: 100%; outline: none; font-family: inherit; }
  .log-field input:focus, .log-field textarea:focus { border-color: var(--accent); }
  .log-field textarea { resize: none; height: 70px; }
  .log-actions { display: flex; gap: 8px; margin-top: 10px; }
  .btn-save { flex: 1; background: var(--accent); color: #0f0f0f; border: none; border-radius: var(--radius-sm); padding: 10px; font-size: 13px; font-weight: 700; cursor: pointer; }
  .btn-clear { background: transparent; border: 0.5px solid var(--border2); color: var(--text2); border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13px; cursor: pointer; }
  .saved-badge { font-size: 11px; color: var(--zone2); display: none; align-items: center; gap: 4px; }
  .saved-badge.show { display: flex; }

  /* PR Panel */
  .pr-btn { position: fixed; bottom: 24px; right: 20px; width: 50px; height: 50px; border-radius: 50%; background: var(--accent); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 22px; box-shadow: 0 4px 16px rgba(232,255,71,0.35); z-index: 200; transition: transform 0.15s; }
  .pr-btn:active { transform: scale(0.92); }
  .pr-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 300; display: none; }
  .pr-overlay.open { display: block; }
  .pr-panel { position: fixed; top: 0; right: 0; bottom: 0; width: min(340px, 100vw); background: var(--bg2); z-index: 400; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); overflow-y: auto; padding: 52px 20px 40px; }
  .pr-panel.open { transform: translateX(0); }
  .pr-panel-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .pr-panel-sub { font-size: 12px; color: var(--text3); margin-bottom: 24px; }
  .pr-close { position: absolute; top: 16px; right: 16px; background: var(--bg3); border: none; color: var(--text2); border-radius: 50%; width: 32px; height: 32px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .pr-section-label { font-size: 10px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: 0.8px; margin: 20px 0 10px; }
  .pr-field { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
  .pr-field:last-of-type { border-bottom: none; }
  .pr-field label { font-size: 13px; color: var(--text2); flex: 1; }
  .pr-field input { width: 90px; background: var(--bg3); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); color: var(--text); font-size: 13px; font-weight: 600; padding: 6px 10px; text-align: center; outline: none; font-family: inherit; }
  .pr-field input:focus { border-color: var(--accent); }
  .pr-save-btn { width: 100%; margin-top: 24px; background: var(--accent); color: #0f0f0f; border: none; border-radius: var(--radius-sm); padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; }
  .pr-saved { text-align: center; font-size: 12px; color: var(--zone2); margin-top: 10px; min-height: 18px; }

  /* Logged data display */
  .log-display { margin-top: 10px; padding: 10px; background: var(--bg2); border-radius: var(--radius-sm); border: 0.5px solid rgba(232,255,71,0.2); display: none; }
  .log-display.show { display: block; }
  .log-display-row { display: flex; justify-content: space-between; font-size: 12px; padding: 3px 0; }
  .log-display-row span:first-child { color: var(--text3); }
  .log-display-row span:last-child { color: var(--text); font-weight: 500; }
  .log-display-notes { font-size: 12px; color: var(--text2); margin-top: 6px; padding-top: 6px; border-top: 0.5px solid var(--border); font-style: italic; }
</style>
</head>
<body>

<div class="app-header">
  <div class="app-title">Month 1 <span>/ Training</span></div>
  <div class="week-tabs" id="weekTabs"></div>
</div>

<div class="progress-bar">

  <span class="prog-pct" id="progPct">0%</span>
</div>

<div class="day-list" id="dayList"></div>

<!-- PR Button -->
<button class="pr-btn" onclick="openPR()" title="Personal Records">🏆</button>

<!-- PR Panel -->
<div class="pr-overlay" id="prOverlay" onclick="closePR()"></div>
<div class="pr-panel" id="prPanel">
  <button class="pr-close" onclick="closePR()">✕</button>

  <div class="pr-section-label">🏃 Running</div>

  <div class="pr-field"><label>400m time (mm:ss)</label><input type="text" id="pr_400m" placeholder="—" /></div>

  <div class="pr-section-label">⏱ Benchmarks</div>
  <div class="pr-field"><label>Fran (mm:ss)</label><input type="text" id="pr_fran" placeholder="—" /></div>
  <div class="pr-field"><label>Grace (mm:ss)</label><input type="text" id="pr_grace" placeholder="—" /></div>

  <button class="pr-save-btn" onclick="savePRs()">Save PRs</button>
  <div class="pr-saved" id="prSaved"></div>
</div>

      warmup:'10 min easy jog + 3×100m strides.',
      main:['3km run time trial — full effort','Pacing: first km at 3:55, negative split if possible','Record time and split each km','Compare to 12:15 baseline'],
      load:'Max effort. Competition simulation.', duration:'30 min',
      fields:[{id:'run_3km_time',label:'3km time (mm:ss)'},{id:'run_km_splits',label:'km splits (e.g. 4:00/3:55/3:50)'}] },
    { day:'Fri', tag:'skill', tagLabel:'Skill', title:'C&J — heavy single', sub:'Test C&J progress',
      why:'Testing Clean & Jerk at end of month 1.',
      warmup:'12 min, thorough.',
      main:['Work up to a heavy single C&J','Target: 130 kg (not a PR attempt — quality heavy single)','Focus: jerk lockout quality under heavy load','If lockout solid at 130, attempt 132.5'],
      load:'Stop if jerk lockout breaks down.', duration:'55 min',
      fields:[{id:'cj_top',label:'Heaviest C&J completed (kg)'},{id:'jerk_lockout',label:'Lockout quality (1-10)'}] },
    { day:'Sat', tag:'zone2', tagLabel:'Zone 2', title:'Recovery row', sub:'35 min easy row',
      why:'Active recovery after test week. Light rowing without adding fatigue.',
      warmup:'3 min easy.',
      main:['35 min easy rowing at 60-65% max HR','This is a recovery session — not Zone 2 training','Focus on technique and breathing'],
      load:'Very easy. Cut to 25 min if tired.', duration:'38 min',
      fields:[{id:'row_duration',label:'Actual duration (min)'},{id:'row_feel',label:'How you felt (1-10)'}] }
  ]
};

const WEEKS = ['w1','w2','w3','w4'];
const WEEK_NAMES = { w1:'Week 1', w2:'Week 2', w3:'Week 3', w4:'Week 4' };
let currentWeek = 'w1';

// Dates — Week 1 starts Monday 29 June 2025
// Each week: Mon-Sat (6 days), skip Sunday between weeks
const START_DATE = new Date(2025, 5, 29); // June 29, 2025
function getSessionDate(weekIndex, dayIndex) {
  const d = new Date(START_DATE);
  d.setDate(d.getDate() + weekIndex * 7 + dayIndex);
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

function storageKey(wk, idx, field) { return `t_${wk}_${idx}_${field}`; }
function getLog(wk, idx) {
  try {
    const raw = localStorage.getItem(`log_${wk}_${idx}`);
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}
function saveLog(wk, idx, data) {
  try { localStorage.setItem(`log_${wk}_${idx}`, JSON.stringify(data)); } catch(e) {}
}
function isDone(wk, idx) {
  try { return localStorage.getItem(`done_${wk}_${idx}`) === '1'; } catch(e) { return false; }
}
function setDone(wk, idx, val) {
  try { localStorage.setItem(`done_${wk}_${idx}`, val ? '1' : '0'); } catch(e) {}
}

function getWeekProgress(wk) {
  const sessions = SESSIONS[wk];
  const done = sessions.filter((_,i) => isDone(wk,i)).length;
  return { done, total: sessions.length };
}

function renderTabs() {
  const tabs = document.getElementById('weekTabs');
  tabs.innerHTML = '';
  WEEKS.forEach(wk => {
    const t = document.createElement('button');
    t.className = 'week-tab' + (wk === currentWeek ? ' active' : '');
    const prog = getWeekProgress(wk);
    t.innerHTML = `${WEEK_NAMES[wk]}<br><span style="font-size:10px;opacity:0.7">${prog.done}/${prog.total}</span>`;
    t.onclick = () => { currentWeek = wk; render(); };
    tabs.appendChild(t);
  });
}

function renderProgress() {
  const { done, total } = getWeekProgress(currentWeek);
  const pct = Math.round((done / total) * 100);
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progPct').textContent = pct + '%';
}

function renderDays() {
  const list = document.getElementById('dayList');
  list.innerHTML = '';
  const sessions = SESSIONS[currentWeek];

  const weekIndex = WEEKS.indexOf(currentWeek);
  sessions.forEach((s, idx) => {
    const done = isDone(currentWeek, idx);
    const log = getLog(currentWeek, idx);
    const dateStr = getSessionDate(weekIndex, idx);

    const card = document.createElement('div');
    card.className = 'day-card' + (done ? ' done' : '');
    card.id = `card_${currentWeek}_${idx}`;

    // Build fields HTML
    let fieldsHTML = s.fields.map(f => {
      const val = log ? (log[f.id] || '') : '';
      return `<div class="log-field"><label>${f.label}</label><input type="text" id="f_${currentWeek}_${idx}_${f.id}" placeholder="—" value="${val}"></div>`;
    }).join('');

    const notesVal = log ? (log.notes || '') : '';
    const hasLog = log && (Object.values(log).some(v => v && v !== ''));

    card.innerHTML = `
      <div class="day-header" onclick="toggleDetail('${currentWeek}',${idx})">
        <div style="display:flex;flex-direction:column;align-items:center;width:36px;flex-shrink:0;gap:1px">
          <span class="day-name">${s.day}</span>
          <span style="font-size:10px;color:var(--text3);white-space:nowrap">${dateStr}</span>
        </div>
        <div class="day-info">
          <div class="day-title">${s.title}</div>
          <div class="day-sub">${s.sub}</div>
        </div>
        <div class="day-right">
          <span class="tag tag-${s.tag}">${s.tagLabel}</span>
          <div class="check-circle${done ? ' checked' : ''}" id="chk_${currentWeek}_${idx}" onclick="toggleDone(event,'${currentWeek}',${idx})">
            <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
              <path d="M1 5L4.5 8.5L11 1" stroke="#0f0f0f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
      </div>
      <div class="day-detail" id="detail_${currentWeek}_${idx}">
        <div class="detail-section">
          <div class="detail-label">Why this session</div>
          <div class="detail-body">${s.why}</div>
        </div>
        <div class="detail-section">
          <div class="detail-label">Warmup</div>
          <div class="detail-body">${s.warmup}</div>
        </div>
        <div class="detail-section">
          <div class="detail-label">Main work</div>
          <ul class="detail-list">${s.main.map(m => `<li>${m}</li>`).join('')}</ul>
        </div>
        <div class="detail-section">
          <div class="detail-label">Load</div>
          <div class="detail-body">${s.load}</div>
        </div>
        <div class="log-section">
          <div class="log-title">Log this session</div>
          <div class="log-row">${fieldsHTML}</div>
          <div class="log-field"><label>Notes</label><textarea id="f_${currentWeek}_${idx}_notes" placeholder="How it went, anything to flag...">${notesVal}</textarea></div>
          <div class="log-actions">
            <button class="btn-save" onclick="saveSession('${currentWeek}',${idx})">Save</button>
            <button class="btn-clear" onclick="clearSession('${currentWeek}',${idx})">Clear</button>
            <span class="saved-badge${hasLog ? ' show' : ''}" id="badge_${currentWeek}_${idx}">✓ Saved</span>
          </div>
          <div class="log-display${hasLog ? ' show' : ''}" id="logdisp_${currentWeek}_${idx}">
            ${hasLog ? buildLogDisplay(s, log) : ''}
          </div>
        </div>
      </div>`;
    list.appendChild(card);
  });
}

function buildLogDisplay(s, log) {
  if (!log) return '';
  let html = s.fields.map(f => {
    const val = log[f.id];
    if (!val) return '';
    return `<div class="log-display-row"><span>${f.label}</span><span>${val}</span></div>`;
  }).join('');
  if (log.notes) html += `<div class="log-display-notes">"${log.notes}"</div>`;
  return html;
}

function toggleDetail(wk, idx) {
  const el = document.getElementById(`detail_${wk}_${idx}`);
  el.classList.toggle('open');
}

function toggleDone(e, wk, idx) {
  e.stopPropagation();
  const current = isDone(wk, idx);
  setDone(wk, idx, !current);
  render();
}

function saveSession(wk, idx) {
  const s = SESSIONS[wk][idx];
  const data = {};
  s.fields.forEach(f => {
    const el = document.getElementById(`f_${wk}_${idx}_${f.id}`);
    if (el) data[f.id] = el.value.trim();
  });
  const notesEl = document.getElementById(`f_${wk}_${idx}_notes`);
  if (notesEl) data.notes = notesEl.value.trim();
  saveLog(wk, idx, data);

  const badge = document.getElementById(`badge_${wk}_${idx}`);
  if (badge) badge.classList.add('show');
  const disp = document.getElementById(`logdisp_${wk}_${idx}`);
  if (disp) { disp.innerHTML = buildLogDisplay(s, data); disp.classList.add('show'); }

  if (!isDone(wk, idx)) { setDone(wk, idx, true); render(); }
}

function clearSession(wk, idx) {
  saveLog(wk, idx, null);
  setDone(wk, idx, false);
  render();
}

function render() {
  renderTabs();
  renderProgress();
  renderDays();
}

render();

// ── PR Panel ──────────────────────────────────────────────
const PR_FIELDS = ['pr_bs','pr_fs','pr_snatch','pr_cj','pr_dl','pr_hspu','pr_pullup','pr_rmu','pr_3km','pr_5km','pr_400m','pr_fran','pr_grace'];

function loadPRs() {
  PR_FIELDS.forEach(id => {
    const val = localStorage.getItem(id);
    const el = document.getElementById(id);
    if (el && val) el.value = val;
  });
}

function savePRs() {
  PR_FIELDS.forEach(id => {
    const el = document.getElementById(id);
    if (el) localStorage.setItem(id, el.value.trim());
  });
  const saved = document.getElementById('prSaved');
  saved.textContent = '✓ Saved!';
  setTimeout(() => { saved.textContent = ''; }, 2000);
}

function openPR() {
  document.getElementById('prPanel').classList.add('open');
  document.getElementById('prOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closePR() {
  document.getElementById('prPanel').classList.remove('open');
  document.getElementById('prOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

loadPRs();
</script>
</body>
</html>
