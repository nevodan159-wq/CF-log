<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Month 1 — Training Tracker</title>
<style>
  :root {
    --bg: #0f0f0f;
    --bg2: #1a1a1a;
    --bg3: #242424;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f0;
    --text2: #999;
    --text3: #666;
    --accent: #e8ff47;
    --accent-dim: rgba(232,255,71,0.12);
    --strength: #60a5fa;
    --strength-bg: rgba(96,165,250,0.12);
    --zone2: #4ade80;
    --zone2-bg: rgba(74,222,128,0.12);
    --skill: #c084fc;
    --skill-bg: rgba(192,132,252,0.12);
    --wod: #fb923c;
    --wod-bg: rgba(251,146,60,0.12);
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; min-height: 100vh; max-width: 430px; margin: 0 auto; }

  /* Header */
  .app-header { padding: 52px 20px 16px; position: sticky; top: 0; background: var(--bg); z-index: 50; border-bottom: 0.5px solid var(--border); }
  .app-header-row { display: flex; align-items: center; justify-content: space-between; }
  .app-title { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .app-title span { color: var(--accent); }
  .pr-open-btn { background: var(--bg3); border: 0.5px solid var(--border2); color: var(--accent); border-radius: var(--radius-sm); padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer; }
  .week-tabs { display: flex; gap: 6px; margin-top: 14px; }
  .week-tab { flex: 1; padding: 8px 4px; border-radius: var(--radius-sm); border: 0.5px solid var(--border); background: transparent; color: var(--text2); font-size: 12px; font-weight: 500; cursor: pointer; text-align: center; transition: all 0.15s; }
  .week-tab.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  /* Progress bar */
  .progress-bar { padding: 12px 20px; display: flex; align-items: center; gap: 10px; }
  .prog-label { font-size: 11px; color: var(--text3); white-space: nowrap; }
  .prog-track { flex: 1; height: 3px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
  .prog-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }
  .prog-pct { font-size: 11px; color: var(--text2); min-width: 28px; text-align: right; }

  /* Tomorrow banner */
  .tomorrow-banner { margin: 4px 16px 0; background: var(--bg2); border: 0.5px solid rgba(232,255,71,0.2); border-radius: var(--radius); padding: 12px 14px; cursor: pointer; }
  .tomorrow-label { font-size: 10px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; }
  .tomorrow-title { font-size: 14px; font-weight: 600; }
  .tomorrow-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }

  /* Day list */
  .day-list { padding: 8px 16px 100px; display: flex; flex-direction: column; gap: 8px; }
  .day-card { background: var(--bg2); border-radius: var(--radius); border: 0.5px solid var(--border); overflow: hidden; cursor: pointer; transition: border-color 0.15s; }
  .day-card.done { border-color: rgba(232,255,71,0.2); }
  .day-card:active { opacity: 0.85; }
  .day-header { display: flex; align-items: center; gap: 12px; padding: 14px 16px; }
  .day-name-col { display: flex; flex-direction: column; align-items: center; width: 36px; flex-shrink: 0; gap: 1px; }
  .day-name { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.6px; }
  .day-date { font-size: 10px; color: var(--text3); white-space: nowrap; }
  .day-info { flex: 1; min-width: 0; }
  .day-title { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.2; }
  .day-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .day-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .tag { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.4px; }
  .tag-strength { background: var(--strength-bg); color: var(--strength); }
  .tag-zone2 { background: var(--zone2-bg); color: var(--zone2); }
  .tag-skill { background: var(--skill-bg); color: var(--skill); }
  .tag-wod { background: var(--wod-bg); color: var(--wod); }
  .check-circle { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--border2); display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
  .check-circle.checked { background: var(--accent); border-color: var(--accent); }
  .check-circle svg { display: none; }
  .check-circle.checked svg { display: block; }
  .has-log-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); opacity: 0.6; }

  /* ── SESSION MODAL ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: none; }
  .modal-overlay.open { display: block; }
  .session-modal { position: fixed; inset: 0; top: 0; background: var(--bg); z-index: 300; display: none; flex-direction: column; overflow: hidden; }
  .session-modal.open { display: flex; }
  .modal-header { padding: 52px 16px 14px; background: var(--bg2); border-bottom: 0.5px solid var(--border); flex-shrink: 0; }
  .modal-header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .modal-back { background: var(--bg3); border: none; color: var(--text2); border-radius: 8px; padding: 6px 12px; font-size: 13px; cursor: pointer; font-family: inherit; }
  .modal-day-badge { font-size: 11px; color: var(--text3); }
  .modal-title { font-size: 20px; font-weight: 700; }
  .modal-sub { font-size: 13px; color: var(--text2); margin-top: 2px; }
  .modal-meta { display: flex; gap: 8px; margin-top: 10px; align-items: center; }
  .modal-body { flex: 1; overflow-y: auto; padding: 0 16px 120px; }
  .modal-section { margin-top: 20px; }
  .modal-section-label { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; }
  .modal-text { font-size: 13px; color: var(--text2); line-height: 1.6; }

  /* Exercise rows with inline log */
  .exercise-list { display: flex; flex-direction: column; gap: 0; }
  .exercise-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 0.5px solid var(--border); }
  .exercise-row:last-child { border-bottom: none; }
  .exercise-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); flex-shrink: 0; margin-top: 1px; align-self: flex-start; margin-top: 6px; }
  .exercise-text { flex: 1; font-size: 13px; color: var(--text2); line-height: 1.4; }
  .exercise-log-input { width: 90px; flex-shrink: 0; background: var(--bg3); border: 0.5px solid var(--border2); border-radius: 6px; color: var(--text); font-size: 12px; padding: 5px 8px; outline: none; font-family: inherit; text-align: center; }
  .exercise-log-input:focus { border-color: var(--accent); }
  .exercise-log-input::placeholder { color: var(--text3); }

  /* Photo section in modal */
  .photo-section { margin-top: 20px; }
  .photo-upload-box { border: 1px dashed var(--border2); border-radius: var(--radius-sm); min-height: 100px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; }
  .photo-upload-box img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; border-radius: var(--radius-sm); }
  .photo-upload-placeholder { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text3); font-size: 12px; pointer-events: none; position: relative; z-index: 1; }
  .photo-remove { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.6); border: none; color: #fff; border-radius: 50%; width: 26px; height: 26px; font-size: 12px; cursor: pointer; z-index: 2; display: none; }
  .photo-remove.show { display: flex; align-items: center; justify-content: center; }

  /* Modal footer */
  .modal-footer { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: var(--bg); border-top: 0.5px solid var(--border); padding: 12px 16px 28px; display: none; flex-direction: column; gap: 8px; z-index: 310; }
  .modal-footer.open { display: flex; }
  .modal-notes-input { background: var(--bg3); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); color: var(--text); font-size: 13px; padding: 8px 10px; outline: none; font-family: inherit; resize: none; height: 52px; width: 100%; }
  .modal-notes-input:focus { border-color: var(--accent); }
  .modal-btn-row { display: flex; gap: 8px; }
  .btn-save { flex: 1; background: var(--accent); color: #0f0f0f; border: none; border-radius: var(--radius-sm); padding: 11px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .btn-done { background: var(--bg3); border: 0.5px solid var(--border2); color: var(--text2); border-radius: var(--radius-sm); padding: 11px 14px; font-size: 13px; cursor: pointer; font-family: inherit; white-space: nowrap; }
  .btn-done.is-done { border-color: var(--accent); color: var(--accent); }
  .save-confirm { font-size: 11px; color: var(--zone2); text-align: center; min-height: 14px; }

  /* PR Panel */
  .pr-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 400; display: none; }
  .pr-overlay.open { display: block; }
  .pr-panel { position: fixed; top: 0; right: 0; bottom: 0; width: min(340px,100vw); background: var(--bg2); z-index: 500; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); overflow-y: auto; padding: 52px 20px 40px; }
  .pr-panel.open { transform: translateX(0); }
  .pr-panel-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .pr-panel-sub { font-size: 12px; color: var(--text3); margin-bottom: 24px; }
  .pr-close { position: absolute; top: 16px; right: 16px; background: var(--bg3); border: none; color: var(--text2); border-radius: 50%; width: 32px; height: 32px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .pr-section-label { font-size: 10px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: 0.8px; margin: 20px 0 10px; }
  .pr-field { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
  .pr-field:last-of-type { border-bottom: none; }
  .pr-field label { font-size: 13px; color: var(--text2); flex: 1; }
  .pr-field input { width: 90px; background: var(--bg3); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); color: var(--text); font-size: 13px; font-weight: 600; padding: 6px 10px; text-align: center; outline: none; font-family: inherit; }
  .pr-field input:focus { border-color: var(--accent); }
  .pr-save-btn { width: 100%; margin-top: 24px; background: var(--accent); color: #0f0f0f; border: none; border-radius: var(--radius-sm); padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; }
  .pr-saved { text-align: center; font-size: 12px; color: var(--zone2); margin-top: 10px; min-height: 18px; }
</style>
</head>
<body>

<div class="app-header">
  <div class="app-header-row">
    <div class="app-title">Month 1 <span>/ Training</span></div>
    <button class="pr-open-btn" onclick="openPR()">🏆 PRs</button>
  </div>
  <div class="week-tabs" id="weekTabs"></div>
</div>

<div class="progress-bar">
  <span class="prog-label">Week progress</span>
  <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  <span class="prog-pct" id="progPct">0%</span>
</div>

<div id="tomorrowBanner"></div>
<div class="day-list" id="dayList"></div>

<!-- Session Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal()"></div>
<div class="session-modal" id="sessionModal">
  <div class="modal-header" id="modalHeader"></div>
  <div class="modal-body" id="modalBody"></div>
  <div class="modal-footer" id="modalFooter"></div>
</div>

<!-- PR Panel -->
<div class="pr-overlay" id="prOverlay" onclick="closePR()"></div>
<div class="pr-panel" id="prPanel">
  <button class="pr-close" onclick="closePR()">✕</button>
  <div class="pr-panel-title">Personal Records</div>
  <div class="pr-panel-sub">Your PRs — saved to this device</div>
  <div class="pr-section-label">💪 Weightlifting</div>
  <div class="pr-field"><label>Back Squat 1RM (kg)</label><input type="number" id="pr_bs" placeholder="—" /></div>
  <div class="pr-field"><label>Front Squat 1RM (kg)</label><input type="number" id="pr_fs" placeholder="—" /></div>
  <div class="pr-field"><label>Snatch 1RM (kg)</label><input type="number" id="pr_snatch" placeholder="—" /></div>
  <div class="pr-field"><label>Clean & Jerk 1RM (kg)</label><input type="number" id="pr_cj" placeholder="—" /></div>
  <div class="pr-field"><label>Deadlift 1RM (kg)</label><input type="number" id="pr_dl" placeholder="—" /></div>
  <div class="pr-section-label">🤸 Gymnastics</div>
  <div class="pr-field"><label>Strict HSPU max reps</label><input type="number" id="pr_hspu" placeholder="—" /></div>
  <div class="pr-field"><label>Strict Pull-ups max reps</label><input type="number" id="pr_pullup" placeholder="—" /></div>
  <div class="pr-field"><label>Ring Muscle-ups max reps</label><input type="number" id="pr_rmu" placeholder="—" /></div>
  <div class="pr-section-label">🏃 Running</div>
  <div class="pr-field"><label>3km time (mm:ss)</label><input type="text" id="pr_3km" placeholder="—" /></div>
  <div class="pr-field"><label>5km time (mm:ss)</label><input type="text" id="pr_5km" placeholder="—" /></div>
  <div class="pr-field"><label>400m time (mm:ss)</label><input type="text" id="pr_400m" placeholder="—" /></div>
  <div class="pr-section-label">⏱ Benchmarks</div>
  <div class="pr-field"><label>Fran (mm:ss)</label><input type="text" id="pr_fran" placeholder="—" /></div>
  <div class="pr-field"><label>Grace (mm:ss)</label><input type="text" id="pr_grace" placeholder="—" /></div>
  <button class="pr-save-btn" onclick="savePRs()">Save PRs</button>
  <div class="pr-saved" id="prSaved"></div>
</div>

<input type="file" id="photoInput" accept="image/*" style="display:none" onchange="handlePhoto(event)" />

const WEEKS = ['w1','w2','w3','w4'];
const WEEK_NAMES = { w1:'Week 1', w2:'Week 2', w3:'Week 3', w4:'Week 4' };
let currentWeek = 'w1';

// Dates — Week 1 starts Monday 29 June 2025
const START_DATE = new Date(2025, 5, 29);
function getSessionDate(weekIndex, dayIndex) {
  const d = new Date(START_DATE);
  d.setDate(d.getDate() + weekIndex * 7 + dayIndex);
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}
function getSessionDateObj(weekIndex, dayIndex) {
  const d = new Date(START_DATE);
  d.setDate(d.getDate() + weekIndex * 7 + dayIndex);
  return d;
}

// ── Storage helpers ───────────────────────────────────────
function getLog(wk, idx)       { try { return JSON.parse(localStorage.getItem(`log_${wk}_${idx}`) || 'null'); } catch(e) { return null; } }
function saveLog(wk, idx, d)   { try { localStorage.setItem(`log_${wk}_${idx}`, JSON.stringify(d)); } catch(e) {} }
function isDone(wk, idx)       { try { return localStorage.getItem(`done_${wk}_${idx}`) === '1'; } catch(e) { return false; } }
function setDone(wk, idx, v)   { try { localStorage.setItem(`done_${wk}_${idx}`, v ? '1' : '0'); } catch(e) {} }
function getPhoto(wk, idx)     { try { return localStorage.getItem(`photo_${wk}_${idx}`) || null; } catch(e) { return null; } }
function savePhoto(wk, idx, v) { try { if(v) localStorage.setItem(`photo_${wk}_${idx}`, v); else localStorage.removeItem(`photo_${wk}_${idx}`); } catch(e) {} }
function getMainLog(wk, idx, mi) { return localStorage.getItem(`ml_${wk}_${idx}_${mi}`) || ''; }
function saveMainLog(wk, idx, mi, v) { try { if(v) localStorage.setItem(`ml_${wk}_${idx}_${mi}`, v); else localStorage.removeItem(`ml_${wk}_${idx}_${mi}`); } catch(e) {} }

function getWeekProgress(wk) {
  const s = SESSIONS[wk];
  return { done: s.filter((_,i) => isDone(wk,i)).length, total: s.length };
}

// ── Tomorrow banner ───────────────────────────────────────
function renderTomorrow() {
  const el = document.getElementById('tomorrowBanner');
  const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 1);
  tomorrow.setHours(0,0,0,0);
  for (let wi = 0; wi < WEEKS.length; wi++) {
    const wk = WEEKS[wi];
    for (let di = 0; di < SESSIONS[wk].length; di++) {
      const d = getSessionDateObj(wi, di);
      d.setHours(0,0,0,0);
      if (d.getTime() === tomorrow.getTime()) {
        const s = SESSIONS[wk][di];
        el.innerHTML = `
          <div class="tomorrow-banner" onclick="openModal('${wk}',${di})">
            <div class="tomorrow-label">Tomorrow · ${s.day} ${getSessionDate(wi, di)}</div>
            <div class="tomorrow-title">${s.title}</div>
            <div class="tomorrow-sub">${s.sub} · ${s.duration}</div>
          </div>`;
        return;
      }
    }
  }
  el.innerHTML = '';
}

// ── Render tabs ───────────────────────────────────────────
function renderTabs() {
  const tabs = document.getElementById('weekTabs');
  tabs.innerHTML = '';
  WEEKS.forEach(wk => {
    const t = document.createElement('button');
    t.className = 'week-tab' + (wk === currentWeek ? ' active' : '');
    const p = getWeekProgress(wk);
    t.innerHTML = `${WEEK_NAMES[wk]}<br><span style="font-size:10px;opacity:0.7">${p.done}/${p.total}</span>`;
    t.onclick = () => { currentWeek = wk; render(); };
    tabs.appendChild(t);
  });
}

function renderProgress() {
  const { done, total } = getWeekProgress(currentWeek);
  const pct = Math.round((done / total) * 100);
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progPct').textContent = pct + '%';
}

// ── Render day list ───────────────────────────────────────
function renderDays() {
  const list = document.getElementById('dayList');
  list.innerHTML = '';
  const weekIndex = WEEKS.indexOf(currentWeek);

  SESSIONS[currentWeek].forEach((s, idx) => {
    const done = isDone(currentWeek, idx);
    const log = getLog(currentWeek, idx);
    const photo = getPhoto(currentWeek, idx);
    const hasLog = log || photo || s.main.some((_,mi) => getMainLog(currentWeek, idx, mi));
    const dateStr = getSessionDate(weekIndex, idx);

    const card = document.createElement('div');
    card.className = 'day-card' + (done ? ' done' : '');
    card.innerHTML = `
      <div class="day-header" onclick="openModal('${currentWeek}',${idx})">
        <div class="day-name-col">
          <span class="day-name">${s.day}</span>
          <span class="day-date">${dateStr}</span>
        </div>
        <div class="day-info">
          <div class="day-title">${s.title}</div>
          <div class="day-sub">${s.sub}</div>
        </div>
        <div class="day-right">
          ${hasLog ? '<div class="has-log-dot"></div>' : ''}
          <span class="tag tag-${s.tag}">${s.tagLabel}</span>
          <div class="check-circle${done ? ' checked' : ''}" id="chk_${currentWeek}_${idx}" onclick="toggleDone(event,'${currentWeek}',${idx})">
            <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
              <path d="M1 5L4.5 8.5L11 1" stroke="#0f0f0f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
      </div>`;
    list.appendChild(card);
  });
}

function toggleDone(e, wk, idx) {
  e.stopPropagation();
  setDone(wk, idx, !isDone(wk, idx));
  render();
}

// ── Session Modal ─────────────────────────────────────────
let modalWk = null, modalIdx = null;

function openModal(wk, idx) {
  modalWk = wk; modalIdx = idx;
  const s = SESSIONS[wk][idx];
  const weekIndex = WEEKS.indexOf(wk);
  const dateStr = getSessionDate(weekIndex, idx);
  const done = isDone(wk, idx);
  const log = getLog(wk, idx) || {};
  const photo = getPhoto(wk, idx);

  // Header
  document.getElementById('modalHeader').innerHTML = `
    <div class="modal-header-top">
      <button class="modal-back" onclick="closeModal()">← Back</button>
      <span class="modal-day-badge">${s.day} · ${dateStr}</span>
    </div>
    <div class="modal-title">${s.title}</div>
    <div class="modal-sub">${s.sub} · ${s.duration}</div>
    <div class="modal-meta">
      <span class="tag tag-${s.tag}">${s.tagLabel}</span>
    </div>`;

  // Body
  const exerciseRows = s.main.map((item, mi) => {
    const savedVal = getMainLog(wk, idx, mi);
    const inputHTML = item.log
      ? `<input class="exercise-log-input" type="text" placeholder="${item.log}" value="${savedVal}"
           onchange="saveMainLog('${wk}',${idx},${mi},this.value)" />`
      : '';
    return `<div class="exercise-row">
      <div class="exercise-dot"></div>
      <div class="exercise-text">${item.text}</div>
      ${inputHTML}
    </div>`;
  }).join('');

  const photoHTML = photo
    ? `<img src="${photo}" /><button class="photo-remove show" onclick="removePhoto()">✕</button>`
    : '<div class="photo-upload-placeholder"><span style="font-size:22px">📷</span><span>Add photo</span></div>';

  document.getElementById('modalBody').innerHTML = `
    <div class="modal-section">
      <div class="modal-section-label">Why this session</div>
      <div class="modal-text">${s.why}</div>
    </div>
    <div class="modal-section">
      <div class="modal-section-label">Warmup</div>
      <div class="modal-text">${s.warmup}</div>
    </div>
    <div class="modal-section">
      <div class="modal-section-label">Main work</div>
      <div class="exercise-list">${exerciseRows}</div>
    </div>
    <div class="modal-section">
      <div class="modal-section-label">Load note</div>
      <div class="modal-text">${s.load}</div>
    </div>
    <div class="photo-section">
      <div class="modal-section-label">Photo</div>
      <div class="photo-upload-box" id="photoBox" onclick="triggerPhoto()">${photoHTML}</div>
    </div>`;

  // Footer
  const notesVal = log.notes || '';
  document.getElementById('modalFooter').innerHTML = `
    <textarea class="modal-notes-input" id="modalNotes" placeholder="Session notes — how it went, anything to flag...">${notesVal}</textarea>
    <div class="modal-btn-row">
      <button class="btn-save" onclick="saveModal()">Save session</button>
      <button class="btn-done${done ? ' is-done' : ''}" id="modalDoneBtn" onclick="toggleModalDone()">
        ${done ? '✓ Done' : 'Mark done'}
      </button>
    </div>
    <div class="save-confirm" id="saveConfirm"></div>`;

  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('sessionModal').classList.add('open');
  document.getElementById('modalFooter').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('sessionModal').classList.remove('open');
  document.getElementById('modalFooter').classList.remove('open');
  document.body.style.overflow = '';
  render();
}

function saveModal() {
  const notes = document.getElementById('modalNotes')?.value?.trim() || '';
  saveLog(modalWk, modalIdx, { notes });
  const c = document.getElementById('saveConfirm');
  if (c) { c.textContent = '✓ Saved'; setTimeout(() => { if(c) c.textContent=''; }, 2000); }
  render();
}

function toggleModalDone() {
  const newVal = !isDone(modalWk, modalIdx);
  setDone(modalWk, modalIdx, newVal);
  const btn = document.getElementById('modalDoneBtn');
  if (btn) { btn.textContent = newVal ? '✓ Done' : 'Mark done'; btn.className = 'btn-done' + (newVal ? ' is-done' : ''); }
  render();
}

// ── Photo ─────────────────────────────────────────────────
function triggerPhoto() {
  document.getElementById('photoInput').click();
}

function handlePhoto(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    // Compress via canvas
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const max = 800;
      let w = img.width, h = img.height;
      if (w > max) { h = h * max / w; w = max; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const compressed = canvas.toDataURL('image/jpeg', 0.7);
      savePhoto(modalWk, modalIdx, compressed);
      const box = document.getElementById('photoBox');
      if (box) {
        box.innerHTML = `<img src="${compressed}" /><button class="photo-remove show" onclick="removePhoto()">✕</button>`;
      }
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function removePhoto() {
  event.stopPropagation();
  savePhoto(modalWk, modalIdx, null);
  const box = document.getElementById('photoBox');
  if (box) box.innerHTML = '<div class="photo-upload-placeholder"><span style="font-size:22px">📷</span><span>Add photo</span></div>';
}

// ── PR Panel ──────────────────────────────────────────────
const PR_FIELDS = ['pr_bs','pr_fs','pr_snatch','pr_cj','pr_dl','pr_hspu','pr_pullup','pr_rmu','pr_3km','pr_5km','pr_400m','pr_fran','pr_grace'];

function loadPRs() {
  PR_FIELDS.forEach(id => {
    const val = localStorage.getItem(id);
    const el = document.getElementById(id);
    if (el && val) el.value = val;
  });
}

function savePRs() {
  PR_FIELDS.forEach(id => {
    const el = document.getElementById(id);
    if (el) localStorage.setItem(id, el.value.trim());
  });
  const s = document.getElementById('prSaved');
  s.textContent = '✓ Saved!';
  setTimeout(() => { s.textContent = ''; }, 2000);
}

function openPR() {
  document.getElementById('prPanel').classList.add('open');
  document.getElementById('prOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closePR() {
  document.getElementById('prPanel').classList.remove('open');
  document.getElementById('prOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

// ── Init ──────────────────────────────────────────────────
function render() {
  renderTabs();
  renderProgress();
  renderDays();
  renderTomorrow();
}

loadPRs();
render();
</script>
