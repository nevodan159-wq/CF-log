<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Training Tracker</title>
<style>
  :root {
    --bg: #111113;
    --bg2: #1c1c1f;
    --bg3: #26262a;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #f2f2f7;
    --text2: #8e8e93;
    --text3: #555;
    --accent: #ffffff;
    --accent-dim: rgba(255,255,255,0.08);
    --green: #30d158;
    --green-bg: rgba(48,209,88,0.12);
    --orange: #ff9f0a;
    --orange-bg: rgba(255,159,10,0.12);
    --strength: #60a5fa;
    --strength-bg: rgba(96,165,250,0.10);
    --zone2: #34d399;
    --zone2-bg: rgba(52,211,153,0.10);
    --skill: #c084fc;
    --skill-bg: rgba(192,132,252,0.10);
    --wod: #fb923c;
    --wod-bg: rgba(251,146,60,0.10);
    --radius: 14px;
    --radius-sm: 9px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; min-height: 100vh; max-width: 430px; margin: 0 auto; }

  /* ── Header ── */
  .app-header { padding: 52px 18px 12px; position: sticky; top: 0; background: var(--bg); z-index: 50; border-bottom: 0.5px solid var(--border); }
  .app-header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .header-left { display: flex; flex-direction: column; gap: 2px; }
  .app-title { font-size: 21px; font-weight: 700; letter-spacing: -0.5px; }
  .app-title span { color: var(--accent); }
  .streak-row { display: flex; align-items: center; gap: 5px; }
  .streak-fire { font-size: 13px; }
  .streak-count { font-size: 12px; font-weight: 700; color: var(--orange); }
  .streak-label { font-size: 12px; color: var(--text3); }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .pr-open-btn { background: var(--bg3); border: 0.5px solid var(--border2); color: var(--accent); border-radius: var(--radius-sm); padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer; }

  /* ── Month tabs ── */
  .month-tabs { display: flex; gap: 6px; margin-bottom: 10px; }
  .month-tab { flex: 1; padding: 8px 8px; border-radius: var(--radius-sm); border: 0.5px solid var(--border); background: transparent; color: var(--text2); font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; transition: all 0.15s; }
  .month-tab.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  /* ── Week tabs ── */
  .week-tabs { display: flex; gap: 5px; margin-bottom: 10px; }
  .week-tab { flex: 1; padding: 6px 4px; border-radius: var(--radius-sm); border: 0.5px solid var(--border); background: transparent; color: var(--text2); font-size: 11px; font-weight: 500; cursor: pointer; text-align: center; transition: all 0.15s; line-height: 1.3; }
  .week-tab.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  /* ── Day strip ── */
  .day-strip-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding: 2px 0 6px; }
  .day-strip-wrap::-webkit-scrollbar { display: none; }
  .day-strip { display: flex; gap: 6px; padding: 0 2px; width: max-content; }
  .day-pill { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 10px; border-radius: 12px; border: 0.5px solid var(--border); background: transparent; cursor: pointer; transition: all 0.15s; min-width: 46px; position: relative; }
  .day-pill:active { opacity: 0.75; }
  .day-pill.selected { background: var(--accent); border-color: var(--accent); }
  .day-pill.is-today:not(.selected) { border-color: rgba(232,255,71,0.5); }
  .day-pill.is-today:not(.selected) .dp-num { color: var(--accent); }
  .day-pill.rest-day { opacity: 0.45; cursor: default; }
  .dp-name { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text3); }
  .day-pill.selected .dp-name { color: #0f0f0f; }
  .dp-num { font-size: 17px; font-weight: 700; color: var(--text); line-height: 1; }
  .day-pill.selected .dp-num { color: #0f0f0f; }
  .dp-dot { width: 5px; height: 5px; border-radius: 50%; }
  .dp-dot.done { background: var(--green); }
  .day-pill.selected .dp-dot.done { background: rgba(0,0,0,0.4); }
  .dp-dot.logged { background: var(--orange); }
  .dp-dot.pending { background: var(--text3); opacity: 0.4; }
  .dp-dot.hidden { opacity: 0; }

  /* ── Progress bar ── */
  .progress-bar { padding: 10px 18px; display: flex; align-items: center; gap: 10px; }
  .prog-label { font-size: 11px; color: var(--text3); white-space: nowrap; }
  .prog-track { flex: 1; height: 3px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
  .prog-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1); }
  .prog-pct { font-size: 11px; color: var(--text2); min-width: 28px; text-align: right; }

  /* ── Tomorrow banner ── */
  .tomorrow-banner { margin: 6px 16px 0; background: linear-gradient(135deg, rgba(232,255,71,0.07) 0%, rgba(232,255,71,0.03) 100%); border: 0.5px solid rgba(232,255,71,0.25); border-radius: var(--radius); padding: 13px 14px; cursor: pointer; transition: opacity 0.15s; }
  .tomorrow-banner:active { opacity: 0.8; }
  .tomorrow-label { font-size: 10px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .tomorrow-title { font-size: 14px; font-weight: 600; }
  .tomorrow-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }

  /* ── Selected day session card ── */
  .selected-session-area { padding: 14px 16px 120px; }
  .session-card { background: var(--bg2); border-radius: var(--radius); border: 0.5px solid var(--border); overflow: hidden; cursor: pointer; transition: border-color 0.2s; }
  .session-card.is-done { border-color: rgba(48,209,88,0.25); }
  .session-card.is-today { border: 1px solid rgba(232,255,71,0.3); }
  .session-card:active { opacity: 0.85; }
  .session-card-header { display: flex; align-items: center; gap: 10px; padding: 16px 16px 14px; }
  .sc-info { flex: 1; min-width: 0; }
  .sc-label { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 5px; }
  .sc-label.today-lbl { color: var(--accent); }
  .sc-title { font-size: 18px; font-weight: 700; color: var(--text); line-height: 1.2; }
  .sc-sub { font-size: 13px; color: var(--text2); margin-top: 3px; }
  .sc-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex-shrink: 0; }

  /* Card header (kept for modal compatibility) */
  .day-header { display: flex; align-items: center; gap: 10px; padding: 13px 14px; }
  .day-name-col { display: flex; flex-direction: column; align-items: center; width: 34px; flex-shrink: 0; gap: 1px; }
  .day-name { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }
  .day-date { font-size: 10px; color: var(--text3); white-space: nowrap; }
  .day-info { flex: 1; min-width: 0; }
  .day-title { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.2; }
  .day-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .day-right { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }

  /* Status indicators */
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .status-dot.done { background: var(--green); }
  .status-dot.logged { background: var(--orange); }
  .status-dot.pending { background: transparent; border: 1.5px solid var(--text3); }
  .status-dot.today-dot { background: var(--accent); box-shadow: 0 0 6px rgba(232,255,71,0.6); }

  /* Tags */
  .tag { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.3px; }
  .tag-strength { background: var(--strength-bg); color: var(--strength); }
  .tag-zone2 { background: var(--zone2-bg); color: var(--zone2); }
  .tag-skill { background: var(--skill-bg); color: var(--skill); }
  .tag-wod { background: var(--wod-bg); color: var(--wod); }

  /* Check circle */
  .check-circle { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--border2); display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
  .check-circle.checked { background: var(--green); border-color: var(--green); }
  .check-circle svg { display: none; }
  .check-circle.checked svg { display: block; }

  /* NEW badge */
  .new-badge { font-size: 9px; font-weight: 700; background: var(--accent); color: #111113; padding: 2px 5px; border-radius: 4px; margin-left: 5px; vertical-align: middle; }

  /* Session stats bar (shown on today card) */
  .session-stats { display: flex; gap: 0; border-top: 0.5px solid var(--border); }
  .stat-item { flex: 1; padding: 10px 0; display: flex; flex-direction: column; align-items: center; gap: 2px; border-right: 0.5px solid var(--border); }
  .stat-item:last-child { border-right: none; }
  .stat-value { font-size: 15px; font-weight: 700; color: var(--text); }
  .stat-label { font-size: 9px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }

  /* Rest day / empty state */
  .rest-card { background: var(--bg2); border-radius: var(--radius); border: 0.5px solid var(--border); padding: 28px 20px; text-align: center; margin: 10px 16px 0; }
  .rest-icon { font-size: 28px; margin-bottom: 8px; }
  .rest-title { font-size: 15px; font-weight: 600; color: var(--text2); margin-bottom: 4px; }
  .rest-quote { font-size: 12px; color: var(--text3); line-height: 1.5; font-style: italic; }
  .rest-author { font-size: 11px; color: var(--text3); margin-top: 6px; font-weight: 600; }

  /* ── SESSION MODAL ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; display: none; backdrop-filter: blur(4px); }
  .modal-overlay.open { display: block; }
  .session-modal { position: fixed; inset: 0; background: var(--bg); z-index: 300; display: none; flex-direction: column; overflow: hidden; }
  .session-modal.open { display: flex; }
  .modal-header { padding: 52px 16px 14px; background: var(--bg2); border-bottom: 0.5px solid var(--border); flex-shrink: 0; }
  .modal-header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .modal-back { background: var(--bg3); border: none; color: var(--text2); border-radius: 8px; padding: 6px 12px; font-size: 13px; cursor: pointer; font-family: inherit; }
  .modal-day-badge { font-size: 11px; color: var(--text3); }
  .modal-title { font-size: 21px; font-weight: 700; line-height: 1.2; }
  .modal-sub { font-size: 13px; color: var(--text2); margin-top: 3px; }
  .modal-meta { display: flex; gap: 8px; margin-top: 12px; align-items: center; }
  .modal-duration { font-size: 11px; color: var(--text3); background: var(--bg3); padding: 3px 8px; border-radius: 20px; }
  .modal-body { flex: 1; overflow-y: auto; padding: 0 16px 130px; }
  .modal-section { margin-top: 22px; }
  .modal-section-label { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
  .modal-text { font-size: 13px; color: var(--text2); line-height: 1.65; }

  /* Exercise rows — tappable, expandable */
  .exercise-list { display: flex; flex-direction: column; }
  .exercise-row { display: flex; flex-direction: column; border-bottom: 0.5px solid var(--border); }
  .exercise-row:last-child { border-bottom: none; }
  .exercise-row-top { display: flex; align-items: center; gap: 10px; padding: 11px 0; cursor: default; }
  .exercise-row.has-log .exercise-row-top { cursor: pointer; }
  .exercise-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); flex-shrink: 0; align-self: flex-start; margin-top: 5px; }
  .exercise-text { flex: 1; font-size: 13px; color: var(--text2); line-height: 1.4; }
  .exercise-chevron { font-size: 11px; color: var(--text3); flex-shrink: 0; transition: transform 0.2s; }
  .exercise-row.open .exercise-chevron { transform: rotate(180deg); color: var(--accent); }
  .exercise-logged-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; display: none; }
  .exercise-logged-dot.show { display: block; }

  /* Expandable log panel */
  .exercise-log-panel { display: none; padding: 0 0 12px 15px; flex-direction: column; gap: 10px; animation: slideDown 0.2s ease; }
  .exercise-row.open .exercise-log-panel { display: flex; }
  @keyframes slideDown { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }
  .log-panel-label { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.7px; }
  .log-panel-fields { display: flex; gap: 8px; flex-wrap: wrap; }
  .log-panel-field { display: flex; flex-direction: column; gap: 4px; }
  .log-panel-field label { font-size: 11px; color: var(--text3); }
  .exercise-log-input { width: 130px; background: var(--bg3); border: 0.5px solid var(--border2); border-radius: 8px; color: var(--text); font-size: 13px; padding: 8px 10px; outline: none; font-family: inherit; text-align: center; transition: border-color 0.2s; }
  .exercise-log-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(255,255,255,0.06); }
  .exercise-log-input::placeholder { color: var(--text3); font-size: 12px; }
  .pr-alert { font-size: 11px; font-weight: 700; color: var(--orange); display: none; animation: prPop 0.3s ease; }
  .pr-alert.show { display: block; }
  @keyframes prPop { from { opacity:0; transform: scale(0.8); } to { opacity:1; transform: scale(1); } }

  /* Fields section (Month 2) */
  .fields-log-section { margin-top: 22px; background: var(--bg3); border-radius: var(--radius-sm); padding: 14px; }
  .fields-log-title { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; }
  .field-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 0.5px solid var(--border); }
  .field-row:last-child { border-bottom: none; }
  .field-label { flex: 1; font-size: 13px; color: var(--text2); }
  .field-input { width: 110px; flex-shrink: 0; background: var(--bg2); border: 0.5px solid var(--border2); border-radius: 7px; color: var(--text); font-size: 12px; padding: 6px 10px; outline: none; font-family: inherit; text-align: center; transition: border-color 0.15s; }
  .field-input:focus { border-color: var(--accent); }

  /* Photo section */
  .photo-section { margin-top: 22px; }
  .photo-upload-box { border: 1px dashed var(--border2); border-radius: var(--radius-sm); min-height: 100px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; transition: border-color 0.15s; }
  .photo-upload-box:active { border-color: var(--accent); }
  .photo-upload-box img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; border-radius: var(--radius-sm); }
  .photo-upload-placeholder { display: flex; flex-direction: column; align-items: center; gap: 5px; color: var(--text3); font-size: 12px; pointer-events: none; position: relative; z-index: 1; }
  .photo-remove { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.65); border: none; color: #fff; border-radius: 50%; width: 26px; height: 26px; font-size: 12px; cursor: pointer; z-index: 2; display: none; }
  .photo-remove.show { display: flex; align-items: center; justify-content: center; }

  /* Modal footer */
  .modal-footer { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: var(--bg); border-top: 0.5px solid var(--border); padding: 12px 16px 30px; display: none; flex-direction: column; gap: 8px; z-index: 310; }
  .modal-footer.open { display: flex; }
  .modal-notes-input { background: var(--bg3); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); color: var(--text); font-size: 13px; padding: 9px 11px; outline: none; font-family: inherit; resize: none; height: 50px; width: 100%; transition: border-color 0.15s; }
  .modal-notes-input:focus { border-color: var(--accent); }
  .modal-btn-row { display: flex; gap: 8px; }
  .btn-save { flex: 1; background: var(--accent); color: #111113; border: none; border-radius: var(--radius-sm); padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; transition: opacity 0.15s; }
  .btn-save:active { opacity: 0.85; }
  .btn-done { background: var(--bg3); border: 0.5px solid var(--border2); color: var(--text2); border-radius: var(--radius-sm); padding: 12px 14px; font-size: 13px; cursor: pointer; font-family: inherit; white-space: nowrap; transition: all 0.15s; }
  .btn-done.is-done { border-color: var(--green); color: var(--green); }
  .save-confirm { font-size: 11px; color: var(--green); text-align: center; min-height: 14px; }

  /* ── PR Panel ── */
  .pr-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 400; display: none; }
  .pr-overlay.open { display: block; }
  .pr-panel { position: fixed; top: 0; right: 0; bottom: 0; width: min(340px,100vw); background: var(--bg2); z-index: 500; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); overflow-y: auto; padding: 52px 20px 40px; }
  .pr-panel.open { transform: translateX(0); }
  .pr-panel-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .pr-panel-sub { font-size: 12px; color: var(--text3); margin-bottom: 24px; }
  .pr-close { position: absolute; top: 16px; right: 16px; background: var(--bg3); border: none; color: var(--text2); border-radius: 50%; width: 32px; height: 32px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .pr-section-label { font-size: 10px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.8px; margin: 20px 0 10px; }
  .pr-field { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
  .pr-field:last-of-type { border-bottom: none; }
  .pr-field label { font-size: 13px; color: var(--text2); flex: 1; }
  .pr-field input { width: 90px; background: var(--bg3); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); color: var(--text); font-size: 13px; font-weight: 600; padding: 6px 10px; text-align: center; outline: none; font-family: inherit; }
  .pr-field input:focus { border-color: var(--accent); }
  .pr-save-btn { width: 100%; margin-top: 24px; background: var(--accent); color: #111113; border: none; border-radius: var(--radius-sm); padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; }
  .pr-saved { text-align: center; font-size: 12px; color: var(--green); margin-top: 10px; min-height: 18px; }
</style>
</head>
<body>

<div class="app-header">
  <div class="app-header-row">
    <div class="header-left">
      <div class="app-title" id="appTitle">Month 1 <span>/ Training</span></div>
      <div class="streak-row">
        <span class="streak-fire">🔥</span>
        <span class="streak-count" id="streakCount">0</span>
        <span class="streak-label" id="streakLabel">day streak</span>
      </div>
    </div>
    <div class="header-right">
      <button class="pr-open-btn" onclick="openPR()">🏆 PRs</button>
    </div>
  </div>
  <div class="month-tabs">
    <button class="month-tab active" id="mTab_m1" onclick="switchMonth('m1')">Month 1</button>
    <button class="month-tab" id="mTab_m2" onclick="switchMonth('m2')">Month 2</button>
  </div>
  <div class="week-tabs" id="weekTabs"></div>
  <div class="day-strip-wrap" id="dayStripWrap">
    <div class="day-strip" id="dayStrip"></div>
  </div>
</div>

<div class="progress-bar">
  <span class="prog-label">Week progress</span>
  <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  <span class="prog-pct" id="progPct">0%</span>
</div>

<div id="tomorrowBanner"></div>
<div class="selected-session-area" id="selectedSessionArea"></div>

<!-- Session Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal()"></div>
<div class="session-modal" id="sessionModal">
  <div class="modal-header" id="modalHeader"></div>
  <div class="modal-body" id="modalBody"></div>
  <div class="modal-footer" id="modalFooter"></div>
</div>

<!-- PR Panel -->
<div class="pr-overlay" id="prOverlay" onclick="closePR()"></div>
<div class="pr-panel" id="prPanel">
  <button class="pr-close" onclick="closePR()">✕</button>
  <div class="pr-panel-title">Personal Records</div>
  <div class="pr-panel-sub">Saved to this device</div>
  <div class="pr-section-label">💪 Weightlifting</div>
  <div class="pr-field"><label>Back Squat 1RM (kg)</label><input type="number" id="pr_bs" placeholder="—" /></div>
  <div class="pr-field"><label>Front Squat 1RM (kg)</label><input type="number" id="pr_fs" placeholder="—" /></div>
  <div class="pr-field"><label>Snatch 1RM (kg)</label><input type="number" id="pr_snatch" placeholder="—" /></div>
  <div class="pr-field"><label>Clean & Jerk 1RM (kg)</label><input type="number" id="pr_cj" placeholder="—" /></div>

// ── Config ────────────────────────────────────────────────
const WEEKS = ['w1','w2','w3','w4'];
const WEEK_NAMES = { w1:'Week 1', w2:'Week 2', w3:'Week 3', w4:'Week 4' };
const M1_START = new Date(2025, 5, 29); // June 29 2025
const M2_START = new Date(2025, 6, 27); // July 27 2025

let currentMonth = 'm1';
let currentWeek = 'w1';

function getSessions() { return currentMonth === 'm1' ? M1_SESSIONS : M2_SESSIONS; }

// ── Date helpers ──────────────────────────────────────────
function getStartDate(m) { return (m||currentMonth) === 'm1' ? M1_START : M2_START; }
function getSessionDate(wi, di, m) {
  const d = new Date(getStartDate(m));
  d.setDate(d.getDate() + wi * 7 + di);
  return d.toLocaleDateString('en-GB', { day:'numeric', month:'short' });
}
function getSessionDateObj(wi, di, m) {
  const d = new Date(getStartDate(m));
  d.setDate(d.getDate() + wi * 7 + di);
  return d;
}

// ── Storage helpers ───────────────────────────────────────
function _pfx(m) { return (m||currentMonth) === 'm1' ? '' : 'm2'; }
function getLog(wk,idx,m)       { try { return JSON.parse(localStorage.getItem(`${_pfx(m)}log_${wk}_${idx}`)||'null'); } catch(e){return null;} }
function saveLog(wk,idx,d,m)    { try { localStorage.setItem(`${_pfx(m)}log_${wk}_${idx}`,JSON.stringify(d)); } catch(e){} }
function isDone(wk,idx,m)       { try { return localStorage.getItem(`${_pfx(m)}done_${wk}_${idx}`)==='1'; } catch(e){return false;} }
function setDone(wk,idx,v,m)    { try { localStorage.setItem(`${_pfx(m)}done_${wk}_${idx}`,v?'1':'0'); } catch(e){} }
function getPhoto(wk,idx,m)     { try { return localStorage.getItem(`${_pfx(m)}photo_${wk}_${idx}`)||null; } catch(e){return null;} }
function savePhoto(wk,idx,v,m)  { try { if(v) localStorage.setItem(`${_pfx(m)}photo_${wk}_${idx}`,v); else localStorage.removeItem(`${_pfx(m)}photo_${wk}_${idx}`); } catch(e){} }
function getMainLog(wk,idx,mi,m) { return localStorage.getItem(`${_pfx(m)}ml_${wk}_${idx}_${mi}`)||''; }
function saveMainLog(wk,idx,mi,v,m) { try { if(v) localStorage.setItem(`${_pfx(m)}ml_${wk}_${idx}_${mi}`,v); else localStorage.removeItem(`${_pfx(m)}ml_${wk}_${idx}_${mi}`); } catch(e){} }
function getFieldLog(wk,idx,fid,m) { return localStorage.getItem(`${_pfx(m)}f_${wk}_${idx}_${fid}`)||''; }
function saveFieldLog(wk,idx,fid,v,m) { try { if(v) localStorage.setItem(`${_pfx(m)}f_${wk}_${idx}_${fid}`,v); else localStorage.removeItem(`${_pfx(m)}f_${wk}_${idx}_${fid}`); } catch(e){} }

function getWeekProgress(wk) {
  const s = getSessions()[wk];
  return { done: s.filter((_,i)=>isDone(wk,i)).length, total: s.length };
}

// ── Streak counter ────────────────────────────────────────
function calcStreak() {
  // Count consecutive done sessions going back from today across all months/weeks
  const allSessions = [];
  ['m1','m2'].forEach(mn => {
    const sess = mn === 'm1' ? M1_SESSIONS : M2_SESSIONS;
    WEEKS.forEach((wk,wi) => {
      sess[wk].forEach((_,di) => {
        allSessions.push({ mn, wk, wi, di, date: getSessionDateObj(wi,di,mn), done: isDone(wk,di,mn) });
      });
    });
  });
  allSessions.sort((a,b) => a.date - b.date);
  const today = new Date(); today.setHours(0,0,0,0);
  // filter past sessions
  const past = allSessions.filter(s => { const d = new Date(s.date); d.setHours(0,0,0,0); return d <= today; });
  let streak = 0;
  for (let i = past.length - 1; i >= 0; i--) {
    if (past[i].done) streak++;
    else break;
  }
  return streak;
}

function updateStreak() {
  const s = calcStreak();
  document.getElementById('streakCount').textContent = s;
  document.getElementById('streakLabel').textContent = s === 1 ? 'day streak' : 'day streak';
  const fireEl = document.querySelector('.streak-fire');
  if (s === 0) { fireEl.textContent = ''; document.getElementById('streakCount').textContent = ''; document.getElementById('streakLabel').textContent = 'No streak yet'; }
  else if (s >= 7) fireEl.textContent = '🔥🔥';
  else fireEl.textContent = '🔥';
}

// ── Find today's session ──────────────────────────────────
function findTodaySession() {
  const today = new Date(); today.setHours(0,0,0,0);
  const allMons = ['m1','m2'];
  const sessMap = { m1: M1_SESSIONS, m2: M2_SESSIONS };
  for (const mn of allMons) {
    for (let wi = 0; wi < WEEKS.length; wi++) {
      const wk = WEEKS[wi];
      for (let di = 0; di < sessMap[mn][wk].length; di++) {
        const d = getSessionDateObj(wi, di, mn);
        d.setHours(0,0,0,0);
        if (d.getTime() === today.getTime()) return { mn, wk, wi, di };
      }
    }
  }
  return null;
}

// ── Session status ────────────────────────────────────────
function getStatus(wk, idx, m) {
  if (isDone(wk, idx, m)) return 'done';
  const mn = m || currentMonth;
  const s = (mn === 'm1' ? M1_SESSIONS : M2_SESSIONS)[wk][idx];
  const hasMainLog = s.main.some((_,mi) => getMainLog(wk,idx,mi,mn));
  const hasFieldLog = s.fields && s.fields.some(f => getFieldLog(wk,idx,f.id,mn));
  const hasNotes = !!getLog(wk,idx,mn);
  if (hasMainLog || hasFieldLog || hasNotes) return 'logged';
  return 'pending';
}

// ── Selected day state ────────────────────────────────────
let selectedDayIdx = null; // 0-5 = session index, 6 = Sunday (rest)

function initSelectedDay() {
  // Auto-select today if in current week, else first session
  const today = new Date(); today.setHours(0,0,0,0);
  const wi = WEEKS.indexOf(currentWeek);
  for (let di = 0; di < 6; di++) {
    const d = getSessionDateObj(wi, di, currentMonth); d.setHours(0,0,0,0);
    if (d.getTime() === today.getTime()) { selectedDayIdx = di; return; }
  }
  selectedDayIdx = 0;
}

function switchMonth(m) {
  currentMonth = m;
  currentWeek = 'w1';
  selectedDayIdx = null;
  document.getElementById('mTab_m1').className = 'month-tab'+(m==='m1'?' active':'');
  document.getElementById('mTab_m2').className = 'month-tab'+(m==='m2'?' active':'');
  document.getElementById('appTitle').innerHTML = `${m==='m1'?'Month 1':'Month 2'} <span>/ Training</span>`;
  render();
}

// ── Tomorrow banner ───────────────────────────────────────
function renderTomorrow() {
  const el = document.getElementById('tomorrowBanner');
  const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate()+1); tomorrow.setHours(0,0,0,0);
  const sessMap = { m1: M1_SESSIONS, m2: M2_SESSIONS };
  for (const mn of ['m1','m2']) {
    for (let wi = 0; wi < WEEKS.length; wi++) {
      const wk = WEEKS[wi];
      for (let di = 0; di < sessMap[mn][wk].length; di++) {
        const d = getSessionDateObj(wi,di,mn); d.setHours(0,0,0,0);
        if (d.getTime() === tomorrow.getTime()) {
          const s = sessMap[mn][wk][di];
          el.innerHTML = `<div class="tomorrow-banner" onclick="switchMonth('${mn}');currentWeek='${wk}';render();openModal('${wk}',${di})">
            <div class="tomorrow-label">↑ Tomorrow · ${s.day} ${getSessionDate(wi,di,mn)}</div>
            <div class="tomorrow-title">${s.title}</div>
            <div class="tomorrow-sub">${s.sub} · ${s.duration}</div>
          </div>`;
          return;
        }
      }
    }
  }
  el.innerHTML = '';
}

    t.onclick = () => { currentWeek=wk; selectedDayIdx=null; render(); };
    tabs.appendChild(t);
  });

function renderProgress() {
  const {done,total} = getWeekProgress(currentWeek);
  const pct = Math.round((done/total)*100);
  document.getElementById('progFill').style.width = pct+'%';
  document.getElementById('progPct').textContent = pct+'%';
}

// ── Render day strip ──────────────────────────────────────
function renderDayStrip() {
  if (selectedDayIdx === null) initSelectedDay();
  const strip = document.getElementById('dayStrip');
  strip.innerHTML = '';
  const wi = WEEKS.indexOf(currentWeek);
  const today = new Date(); today.setHours(0,0,0,0);
  const sessions = getSessions()[currentWeek];
  const DAY_NAMES = ['MON','TUE','WED','THU','FRI','SAT','SUN'];

  for (let di = 0; di < 7; di++) {
    const isSunday = di === 6;
    const sessionDate = getSessionDateObj(wi, isSunday ? 5 : di, currentMonth); // use sat date + 1 for sun
    if (isSunday) sessionDate.setDate(sessionDate.getDate() + 1);
    sessionDate.setHours(0,0,0,0);
    const dateNum = sessionDate.getDate();
    const isToday = sessionDate.getTime() === today.getTime();
    const isSelected = selectedDayIdx === di;
    const hasSession = !isSunday;
    const status = hasSession ? getStatus(currentWeek, di) : null;

    const pill = document.createElement('div');
    let cls = 'day-pill';
    if (isSelected) cls += ' selected';
    if (isToday) cls += ' is-today';
    if (!hasSession) cls += ' rest-day';
    pill.className = cls;

    let dotCls = 'dp-dot hidden';
    if (hasSession) {
      if (status === 'done') dotCls = 'dp-dot done';
      else if (status === 'logged') dotCls = 'dp-dot logged';
      else dotCls = 'dp-dot pending';
    }

    pill.innerHTML = `
      <span class="dp-name">${DAY_NAMES[di]}</span>
      <span class="dp-num">${dateNum}</span>
      <span class="${dotCls}"></span>`;

    if (hasSession) {
      pill.onclick = () => selectDay(di);
    }
    strip.appendChild(pill);
  }

  // Scroll selected pill into view
  const pills = strip.querySelectorAll('.day-pill');
  const sel = pills[selectedDayIdx ?? 0];
  if (sel) sel.scrollIntoView({ inline: 'center', behavior: 'smooth', block: 'nearest' });
}

function selectDay(di) {
  selectedDayIdx = di;
  renderDayStrip();
  renderSelectedSession();
}

// ── Exercise expand/collapse ──────────────────────────────
function toggleExercise(mi) {
  const row = document.getElementById(`exrow_${mi}`);
  if (!row) return;

  // close all first
  document.querySelectorAll('.exercise-row.open').forEach(r => r.classList.remove('open'));
  if (!wasOpen) {
    row.classList.add('open');
    // focus the input
    const input = row.querySelector('.exercise-log-input');
    if (input) setTimeout(() => input.focus(), 180);
  }
}

function markLogged(mi, val) {
  const row = document.getElementById(`exrow_${mi}`);
  if (!row) return;
  const dot = row.querySelector('.exercise-logged-dot');
  if (dot) dot.classList.toggle('show', val.trim() !== '');
}

// ── PR detection ──────────────────────────────────────────
function checkPR(inputEl, prKey, currentVal) {
  if (!prKey || !currentVal) return;
  const existing = parseFloat(localStorage.getItem(prKey));
  const incoming = parseFloat(currentVal);
  if (isNaN(incoming)) return;
  const alertEl = inputEl.parentElement.querySelector('.pr-alert');
  if (!alertEl) return;
  // For time fields (lower is better): pr_3km, pr_5km, pr_400m, pr_fran, pr_grace
  const lowerBetter = ['pr_3km','pr_5km','pr_400m','pr_fran','pr_grace'].includes(prKey);
  const isPR = isNaN(existing) || (lowerBetter ? incoming < existing : incoming > existing);
  if (isPR) {
    alertEl.textContent = '🔥 New PR!';
    alertEl.classList.add('show');
  } else {
    alertEl.classList.remove('show');
  }
}

// ── Session Modal ─────────────────────────────────────────
let modalWk = null, modalIdx = null, modalMonth = null;

function openModal(wk, idx) {
  modalWk = wk; modalIdx = idx; modalMonth = currentMonth;
  const sessions = getSessions();
  const s = sessions[wk][idx];
  const wi = WEEKS.indexOf(wk);
  const dateStr = getSessionDate(wi, idx, currentMonth);
  const done = isDone(wk, idx);
  const log = getLog(wk, idx) || {};
  const photo = getPhoto(wk, idx);

  document.getElementById('modalHeader').innerHTML = `
    <div class="modal-header-top">
      <button class="modal-back" onclick="closeModal()">← Back</button>
      <span class="modal-day-badge">${s.day} · ${dateStr}</span>
    </div>
    <div class="modal-title">${s.title}</div>
    <div class="modal-sub">${s.sub}</div>
    <div class="modal-meta">
      <span class="tag tag-${s.tag}">${s.tagLabel}</span>
      <span class="modal-duration">⏱ ${s.duration}</span>
    </div>`;

  const exerciseRows = s.main.map((item, mi) => {
    const isObj = typeof item === 'object';
    const text = isObj ? item.text : item;
    const hasLog = isObj && item.log;
    const prKey = isObj ? (item.prKey||'') : '';
    const savedVal = hasLog ? getMainLog(wk,idx,mi,currentMonth) : '';
    const hasValue = savedVal.trim() !== '';

    if (!hasLog) {
      return `<div class="exercise-row">
        <div class="exercise-row-top">
          <div class="exercise-dot"></div>
          <div class="exercise-text">${text}</div>
        </div>
      </div>`;
    }

    return `<div class="exercise-row has-log${hasValue?' logged':''}" id="exrow_${mi}">
      <div class="exercise-row-top" onclick="toggleExercise(${mi})">
        <div class="exercise-dot"></div>
        <div class="exercise-text">${text}</div>
        <span class="exercise-logged-dot${hasValue?' show':''}"></span>
        <span class="exercise-chevron">▾</span>
      </div>
      <div class="exercise-log-panel">
        <div class="log-panel-label">${item.log}</div>
        <div class="log-panel-fields">
          <div class="log-panel-field">
            <input class="exercise-log-input" type="text" placeholder="Enter value…" value="${savedVal}"
              onchange="saveMainLog('${wk}',${idx},${mi},this.value,'${currentMonth}');checkPR(this,'${prKey}',this.value);markLogged(${mi},this.value)" />
            <span class="pr-alert"></span>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  let fieldsHTML = '';
  if (s.fields && s.fields.length) {
    const fieldRows = s.fields.map(f => {
      const saved = getFieldLog(wk,idx,f.id,currentMonth);
      const prKey = f.prKey || '';
      return `<div class="field-row">
        <span class="field-label">${f.label}</span>
        <div class="exercise-log-wrap">
          <input class="field-input" type="text" placeholder="—" value="${saved}"
            onchange="saveFieldLog('${wk}',${idx},'${f.id}',this.value,'${currentMonth}');checkPR(this,'${prKey}',this.value)" />
          <span class="pr-alert"></span>
        </div>
      </div>`;
    }).join('');
    fieldsHTML = `<div class="fields-log-section"><div class="fields-log-title">Session log</div>${fieldRows}</div>`;
  }

  const photoHTML = photo
    ? `<img src="${photo}" /><button class="photo-remove show" onclick="removePhoto()">✕</button>`
    : '<div class="photo-upload-placeholder"><span style="font-size:22px">📷</span><span>Add photo</span></div>';

  document.getElementById('modalBody').innerHTML = `
    <div class="modal-section">
      <div class="modal-section-label">Why this session</div>
      <div class="modal-text">${s.why}</div>
    </div>
    <div class="modal-section">
      <div class="modal-section-label">Warmup</div>
      <div class="modal-text">${s.warmup}</div>
    </div>
    <div class="modal-section">
      <div class="modal-section-label">Main work</div>
      <div class="exercise-list">${exerciseRows}</div>
    </div>
    ${fieldsHTML}
    <div class="modal-section">
      <div class="modal-section-label">Load note</div>
      <div class="modal-text">${s.load}</div>
    </div>
    <div class="photo-section">
      <div class="modal-section-label">Photo</div>
      <div class="photo-upload-box" id="photoBox" onclick="triggerPhoto()">${photoHTML}</div>
    </div>`;

  const notesVal = log.notes || '';
  document.getElementById('modalFooter').innerHTML = `
    <textarea class="modal-notes-input" id="modalNotes" placeholder="Session notes — how it went, anything to flag...">${notesVal}</textarea>
    <div class="modal-btn-row">
      <button class="btn-save" onclick="saveModal()">Save session</button>
      <button class="btn-done${done?' is-done':''}" id="modalDoneBtn" onclick="toggleModalDone()">
        ${done?'✓ Done':'Mark done'}
      </button>
    </div>
    <div class="save-confirm" id="saveConfirm"></div>`;

  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('sessionModal').classList.add('open');
  document.getElementById('modalFooter').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('sessionModal').classList.remove('open');
  document.getElementById('modalFooter').classList.remove('open');
  document.body.style.overflow = '';
  render();
}

function saveModal() {
  const notes = document.getElementById('modalNotes')?.value?.trim() || '';
  saveLog(modalWk, modalIdx, { notes }, modalMonth);
  const c = document.getElementById('saveConfirm');
  if (c) { c.textContent = '✓ Saved'; setTimeout(()=>{ if(c) c.textContent=''; }, 2000); }
  render();
}

function toggleModalDone() {
  const newVal = !isDone(modalWk, modalIdx, modalMonth);
  setDone(modalWk, modalIdx, newVal, modalMonth);
  const btn = document.getElementById('modalDoneBtn');
  if (btn) { btn.textContent = newVal?'✓ Done':'Mark done'; btn.className='btn-done'+(newVal?' is-done':''); }
  render();
}

// ── Photo ─────────────────────────────────────────────────
function triggerPhoto() { document.getElementById('photoInput').click(); }

function handlePhoto(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const max = 800; let w = img.width, h = img.height;
      if (w > max) { h = h*max/w; w = max; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const compressed = canvas.toDataURL('image/jpeg',0.7);
      savePhoto(modalWk, modalIdx, compressed, modalMonth);
      const box = document.getElementById('photoBox');
      if (box) box.innerHTML = `<img src="${compressed}" /><button class="photo-remove show" onclick="removePhoto()">✕</button>`;
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file); e.target.value = '';
}

function removePhoto() {
  event.stopPropagation();
  savePhoto(modalWk, modalIdx, null, modalMonth);
  const box = document.getElementById('photoBox');
  if (box) box.innerHTML = '<div class="photo-upload-placeholder"><span style="font-size:22px">📷</span><span>Add photo</span></div>';
}

// ── PR Panel ──────────────────────────────────────────────
const PR_FIELDS = ['pr_bs','pr_fs','pr_snatch','pr_cj','pr_dl','pr_hspu','pr_pullup','pr_rmu','pr_3km','pr_5km','pr_400m','pr_fran','pr_grace'];

function loadPRs() {
  PR_FIELDS.forEach(id => { const v=localStorage.getItem(id); const el=document.getElementById(id); if(el&&v) el.value=v; });
}
function savePRs() {
  PR_FIELDS.forEach(id => { const el=document.getElementById(id); if(el) localStorage.setItem(id,el.value.trim()); });
  const s=document.getElementById('prSaved'); s.textContent='✓ Saved!'; setTimeout(()=>{s.textContent='';},2000);
}
function openPR() { document.getElementById('prPanel').classList.add('open'); document.getElementById('prOverlay').classList.add('open'); document.body.style.overflow='hidden'; }
function closePR() { document.getElementById('prPanel').classList.remove('open'); document.getElementById('prOverlay').classList.remove('open'); document.body.style.overflow=''; }

// ── Init ──────────────────────────────────────────────────
function render() {
  updateStreak();
  renderTabs();
  renderProgress();
  renderDayStrip();
  renderSelectedSession();
  renderTomorrow();
}

loadPRs();
render();
</script>
</body>
</html>
